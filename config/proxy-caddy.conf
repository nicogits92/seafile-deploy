# Caddy external reverse proxy configuration for Seafile
# =============================================================================
# Use this if Caddy is your external reverse proxy (separate from the internal
# seafile-caddy container which handles internal routing).
#
# Replace seafile.yourdomain.com with your actual domain.
# Replace YOUR_DOCKER_HOST_IP with the IP address of your Docker VM.
# Replace 8080 if you changed CADDY_PORT in .env.
#
# Caddy handles WebSocket upgrades, read/write timeouts, and SSL automatically.
# No additional header or timeout directives are required.
# =============================================================================

seafile.yourdomain.com {
    reverse_proxy YOUR_DOCKER_HOST_IP:8080 {
        header_up X-Forwarded-Proto https
    }
}
