# =============================================================================
# seafevents.conf — Background event worker configuration
# =============================================================================
# Written by:  seafile-config-fixes.sh / update.sh
# Deployed to: $SEAFILE_VOLUME/seafile/conf/seafevents.conf
#
# REFERENCE FILE — see seahub_settings.py header for editing note.
#
# Non-standard vs default Seafile seafevents.conf:
#   - [SEAHUB EMAIL] enabled (default: false) — sends email digests for notifications.
#   - [STATISTICS] enabled (default: false) — tracks storage and user activity.
#   - [FILE HISTORY] enabled with expanded suffix list including sdoc files.
#   - [AUDIT] enabled (default: false) — logs file access and admin actions.
#   - [METADATA] enabled — required for the extended properties feature.
#   - [REDIS] section added — required for [METADATA] to connect to the cache.
#     Seafile 13 manages Redis via .env for the main cache but seafevents still
#     needs its own explicit Redis block to run the metadata index worker.
#   - [DATABASE] block intentionally absent — deprecated in Seafile 12→13,
#     replaced by environment variables in .env.
#   - [INDEX FILES] intentionally absent — Pro edition full-text search only.
# =============================================================================

[SEAHUB EMAIL]
enabled = true
interval = 30m

[STATISTICS]
enabled = true

[FILE HISTORY]
enabled = true
suffix = md,txt,doc,docx,xls,xlsx,ppt,pptx,sdoc

[AUDIT]
enabled = true

[VIRUS SCAN]
enabled = false

[METADATA]
enabled = true

# Redis connection is required for the metadata worker to function.
# Without this section seafevents cannot connect to Redis and
# metadata indexing will silently not start.
[REDIS]
host = redis
port = 6379
