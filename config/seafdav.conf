# =============================================================================
# seafdav.conf — WebDAV configuration
# =============================================================================
# Written by:  seafile-config-fixes.sh / update.sh
# Deployed to: $SEAFILE_VOLUME/seafile/conf/seafdav.conf
#
# REFERENCE FILE — see seahub_settings.py header for editing note.
#
# WebDAV is disabled by default in this deployment. To enable it:
#   1. Set enabled = true below
#   2. Run update.sh to deploy the change
#   3. Add a proxy rule in NPM for the /seafdav path
#
# Note: Since Seafile 12, LDAP users cannot authenticate to WebDAV with their
# LDAP password. They must generate a WebDAV token from their profile page.
# =============================================================================

[WEBDAV]
enabled = false
port = 8080
share_name = /seafdav
