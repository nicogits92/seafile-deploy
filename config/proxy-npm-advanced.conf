# =============================================================================
# npm-advanced.conf — Nginx Proxy Manager advanced tab configuration
# =============================================================================
# Used by:     Nginx Proxy Manager (external, not part of this stack)
# Paste into:  NPM → Proxy Hosts → your Seafile host → Advanced tab
#
# Sets proxy timeouts and WebSocket headers needed for Collabora Online and
# SeaDoc real-time editing. Without the extended timeouts, large document
# operations will 502 mid-session.
#
# Before pasting, replace YOUR_DOCKER_HOST_IP with the actual IP address of
# your Seafile Docker host (the machine running the stack).
#
# This config:
#   - Forwards all traffic to Caddy on port 7080 (matches CADDY_PORT in .env)
#   - Passes the correct headers so Seafile knows the real client IP and protocol
#   - Enables WebSocket support (required for SeaDoc and Collabora)
#   - Removes upload size limits and sets a long timeout for large file transfers
# =============================================================================

location / {
    proxy_pass http://YOUR_DOCKER_HOST_IP:7080;  # Change 7080 if you changed CADDY_PORT in .env
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_read_timeout 1200s;
    proxy_buffering off;
    client_max_body_size 0;
}
