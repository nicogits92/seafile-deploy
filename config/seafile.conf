# =============================================================================
# seafile.conf — Core fileserver configuration
# =============================================================================
# Written by:  seafile-config-fixes.sh / update.sh
# Deployed to: $SEAFILE_VOLUME/seafile/conf/seafile.conf
#
# REFERENCE FILE — see seahub_settings.py header for editing note.
#
# Non-standard vs default Seafile 13 seafile.conf:
#   - This file intentionally contains only [fileserver]. In Seafile 13 Docker
#     deployments, notification server, database, memcached, and other sections
#     that existed in older versions are all configured via environment variables
#     in .env and injected by docker-compose. The official upgrade docs for
#     Seafile 12→13 explicitly say to remove those blocks.
# =============================================================================

[fileserver]
port = 8082
# Per Seafile 13 docs, this is the only required entry in seafile.conf.
# Notification server, database, memcached, and other sections that appeared
# in older versions are now configured via environment variables in .env and
# passed to the seafile container by docker-compose. Including those sections
# here is deprecated as of Seafile 12→13 and will cause warnings.
